# ScyllaDB lab stack for continuum-bench native adapter campaigns.
# Usage: scripts/up.sh [scylla-1|scylla-3]

services:
  scylla-0:
    profiles: [scylla-1, scylla-3]
    image: scylladb/scylla:6.2
    command: --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
    volumes:
      - scylla-0-data:/var/lib/scylla

  scylla-1:
    profiles: [scylla-3]
    image: scylladb/scylla:6.2
    command: --seeds=scylla-0 --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9043:9042"
    depends_on:
      - scylla-0
    volumes:
      - scylla-1-data:/var/lib/scylla

  scylla-2:
    profiles: [scylla-3]
    image: scylladb/scylla:6.2
    command: --seeds=scylla-0 --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9044:9042"
    depends_on:
      - scylla-0
    volumes:
      - scylla-2-data:/var/lib/scylla

volumes:
  scylla-0-data:
  scylla-1-data:
  scylla-2-data:

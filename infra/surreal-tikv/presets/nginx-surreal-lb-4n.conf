events {
    worker_connections 1024;
}

http {
    upstream surreal_upstream {
        server surreal-1:8000;
        server surreal-2:8000;
        server surreal-3:8000;
        server surreal-4:8000;
    }

    server {
        listen 8000;

        location / {
            proxy_pass http://surreal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
